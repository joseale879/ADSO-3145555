server.port=8080

# Base de datos: Backend en Docker conecta a PostgreSQL en Docker (por nombre del servicio)
spring.datasource.url=jdbc:postgresql://db:5432/tareas_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de conexión
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Swagger/OpenAPI
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.org.springframework.boot.actuate.autoconfigure.web=TRACE
logging.level.org.springframework.jdbc.core=DEBUG