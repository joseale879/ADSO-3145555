
databaseChangeLog:
  # Fase 1: Crear extensiones necesarias
  - changeSet:
      id: 00-extensions
      author: jose
      context: database-setup
      labels: extensions
      comments: "Crear extensiones de PostgreSQL necesarias"
      changes:
        - sqlFile:
            path: CHANGES/DDL/00_EXTENCIONS/extencion.sql
            relativeToChangelogFile: true
            stripComments: true
      rollback:
        - sql: "DROP EXTENSION IF EXISTS pgcrypto;"

  # Fase 2: Crear estructura (tablas)
  - changeSet:
      id: 01-create-tables
      author: jose
      context: database-setup
      labels: ddl,structure
      comments: "Crear todas las tablas necesarias"
      failOnError: true
      changes:
        - sqlFile:
            path: CHANGES/DDL/01_TABLES/01-ddl-tables.sql
            relativeToChangelogFile: true
            stripComments: true
      rollback:
        - sqlFile:
            path: ROLLBACKS/DDL/00_TABLES/01-drop-tables.sql
            relativeToChangelogFile: true

  # Fase 3: Insertar datos iniciales
  - changeSet:
      id: 02-insert-data
      author: jose
      context: database-setup
      labels: dml,data-seeding
      comments: "Insertar datos iniciales"
      failOnError: true
      changes:
        - sqlFile:
            path: CHANGES/DML/00-INSERTS/02-dml-tables.sql
            relativeToChangelogFile: true
            stripComments: true
      rollback:
        - sqlFile:
            path: ROLLBACKS/DML/00_INSERTS/02-drop-data.sql
            relativeToChangelogFile: true